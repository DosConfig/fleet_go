name: fleet_go
description: DRT shuttle fleet management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  flutter_naver_map: ^1.4.4
  flutter_dotenv: ^5.2.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4

flutter:
  uses-material-design: true
  assets:
    - .env
